<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Disease Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e3c0c;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
        }
        .header {
            background: #1e3c0c;
            color: white;
            padding: 20px;
            text-align: center;
            margin: -25px -25px 25px -25px;
            border-radius: 20px 20px 0 0;
        }
        select, input[type="file"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2d5a1e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #1e3c0c;
        }
        .result-box {
            background: #f5f5f5;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2d5a1e;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .image-preview img {
            max-width: 150px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .raw {
            background: #2d2d2d;
            color: #00ff00;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 15px;
            white-space: pre-wrap;
        }
        h4 {
            margin: 10px 0 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 AI Crop Disease Detection</h1>
            <p>Upload leaf image to detect disease</p>
        </div>

        <label>🌽 Select Crop:</label>
        <select id="crop">
            <option value="maize">Maize (Corn)</option>
            <option value="tomato">Tomato</option>
            <option value="potato">Potato</option>
            <option value="wheat">Wheat</option>
            <option value="rice">Rice</option>
        </select>

        <label>📷 Upload Leaf Image:</label>
        <input type="file" id="image" accept="image/*">
        <div class="image-preview" id="preview"></div>

        <button id="predictBtn">🔬 Detect Disease</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        const cropSelect = document.getElementById('crop');
        const imageInput = document.getElementById('image');
        const predictBtn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const previewDiv = document.getElementById('preview');

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewDiv.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            } else {
                previewDiv.innerHTML = '';
            }
        });

        predictBtn.addEventListener('click', async () => {
            const crop = cropSelect.value;
            const imageFile = imageInput.files[0];

            if (!imageFile) {
                resultDiv.innerHTML = '<div class="error">❌ Please select an image first</div>';
                return;
            }

            resultDiv.innerHTML = '';
            loading.style.display = 'block';
            predictBtn.disabled = true;

            const formData = new FormData();
            formData.append('crop', crop);
            formData.append('image', imageFile);

            try {
                const response = await fetch('http://localhost:5000/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                // Show raw response
                let html = `<h4>📡 Raw Response from Server:</h4>`;
                html += `<div class="raw">${JSON.stringify(data, null, 2)}</div>`;
                
                // Try to display formatted result
                if (data.status === 'success') {
                    html += `<div class="result-box">`;
                    html += `<h4>🌿 Prediction Result:</h4>`;
                    html += `<p><strong>Disease:</strong> ${data.prediction?.disease || data.disease || 'N/A'}</p>`;
                    html += `<p><strong>Confidence:</strong> ${data.prediction?.confidence || data.confidence || 0}%</p>`;
                    html += `<p><strong>Treatment:</strong> ${data.prediction?.treatment || data.treatment || 'N/A'}</p>`;
                    html += `</div>`;
                } else if (data.error) {
                    html += `<div class="error">❌ Error: ${data.error}</div>`;
                } else {
                    html += `<div class="error">❌ Unexpected response format</div>`;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Connection error: ${error.message}<br><br>Make sure backend is running at http://localhost:5000</div>`;
            } finally {
                loading.style.display = 'none';
                predictBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
