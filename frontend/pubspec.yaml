name: crop_disease_app
description: AI-Powered Crop Disease Detection
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Localization
  easy_localization: ^3.0.8

  # Camera
  camera: ^0.11.0+2

  # Images
  image: ^4.1.7
  image_picker: ^1.2.2

  # Offline TTS
  flutter_tts: ^4.2.5

  # Networking
  http: ^1.1.0

  # Local DB 
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.2.0

  # Permission handler
  permission_handler: ^11.0.0

  # Charts
  fl_chart: ^0.68.0

  # Date formatting
  intl: ^0.20.2

  # Sharing
  share_plus: ^13.1.0
  csv: ^6.0.0

   # Supabase for authentication and cloud storage
  supabase_flutter: ^2.12.4

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    
   